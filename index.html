async function ghLoad(token) {
  const r = await fetch(GH_API, { headers: { Authorization: "token " + token, Accept: "application/vnd.github.v3+json" } });
  if (r.status === 404) return null;
  if (!r.ok) throw new Error("GitHub " + r.status);
  const d = await r.json();
  const clean = d.content.replace(/\n/g, "");
  return { tasks: JSON.parse(decodeURIComponent(escape(atob(clean)))), sha: d.sha };
}

async function ghSave(token, tasks, sha) {
  const json = JSON.stringify(tasks, null, 2);
  const content = btoa(unescape(encodeURIComponent(json)));
  const body = { message: "update tracker", content: content };
  if (sha) body.sha = sha;
  const r = await fetch(GH_API, { method: "PUT", headers: { Authorization: "token " + token, "Content-Type": "application/json" }, body: JSON.stringify(body) });
  if (!r.ok) throw new Error("GitHub " + r.status);
  const d = await r.json();
  return d.content.sha;
}
