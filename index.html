function fmt(d){ if(!d) return "—"; const [y,m,day]=d.split("-"); return `${day}/${m}/${y}`; }
function dLeft(d){ if(!d) return null; return Math.ceil((new Date(d)-new Date())/86400000); }

function Chip({date}){
  const d=dLeft(date); if(d===null) return null;
  const c=d<0?"#ef4444":d<=3?"#f97316":d<=7?"#eab308":"#94a3b8";
  const l=d<0?`${Math.abs(d)}j dépassé`:d===0?"Aujourd'hui":`J-${d}`;
  return React.createElement("span",{style:{fontSize:10,fontWeight:700,color:c,background:`${c}18`,padding:"2px 7px",borderRadius:20}},l);
}

function CtxPanel({ctx}){
  const blocks=[
    {k:"situation",title:"📍 Situation actuelle",color:"#3b82f6",bg:"#f0f9ff"},
    {k:"pourquoi",title:"🎯 Pourquoi c'est important",color:"#b45309",bg:"#fef9ec"},
    {k:"ameliore",title:"✨ Ce que ça améliore",color:"#7c3aed",bg:"#fdf4ff"},
  ];
  return React.createElement("div",{style:{display:"grid",gap:9}},
    ...blocks.map(b=>React.createElement("div",{key:b.k,style:{background:b.bg,borderRadius:9,padding:"10px 13px",borderLeft:`3px solid ${b.color}`}},
      React.createElement("div",{style:{fontSize:10,fontWeight:700,color:b.color,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:5}},b.title),

        ctx.comment.map((s,i)=>React.createElement("li",{key:i,style:{fontSize:12,color:"#334155",lineHeight:1.55}},s))
      )
    )

}

    onMouseEnter:()=>setHover(true), onMouseLeave:()=>setHover(false),
    style:{background:done?"#f8fafc":"#fff",border:`1px solid ${done?"#e2e8f0":"#f1f5f9"}`,borderLeft:`3px solid ${done?"#cbd5e1":cat.color}`,borderRadius:10,padding:"11px 13px",cursor:"pointer",transition:"all 0.15s",opacity:done?0.55:1,boxShadow:hover&&!done?"0 4px 14px #0000000e":"none",transform:hover&&!done?"translateY(-1px)":"none"}
  },
    React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}},
      React.createElement("div",{style:{flex:1}},
        React.createElement("div",{style:{fontSize:13,fontWeight:600,color:done?"#94a3b8":"#1e293b",lineHeight:1.3,textDecoration:done?"line-through":"none"}},`${PRIORITIES[task.priority].dot} ${task.title}`),
        React.createElement("p",{style:{margin:"4px 0 0",fontSize:11.5,color:"#64748b",lineHeight:1.5}},task.description),
        React.createElement("div",{style:{display:"flex",gap:5,flexWrap:"wrap",marginTop:6}},
          React.createElement("span",{style:{fontSize:10,fontWeight:600,color:cat.color,background:cat.bg,padding:"2px 7px",borderRadius:20}},`${cat.icon} ${cat.label}`),
          task.tags.map(t=>React.createElement("span",{key:t,style:{fontSize:10,color:"#64748b",background:"#f1f5f9",padding:"2px 7px",borderRadius:20}},t))
        )
      ),
      React.createElement("span",{style:{fontSize:10,fontWeight:700,color:"#64748b",background:"#f1f5f9",padding:"3px 9px",borderRadius:20,whiteSpace:"nowrap",flexShrink:0}},STATUSES[task.status].label)
    ),
    React.createElement("div",{style:{display:"flex",gap:12,marginTop:8,flexWrap:"wrap"}},
      task.dateEcheance&&React.createElement("div",{style:{display:"flex",alignItems:"center",gap:4}},
        React.createElement("span",{style:{fontSize:10,color:"#94a3b8"}},"📅"),
        React.createElement("span",{style:{fontSize:10,fontWeight:600,color:"#475569"}},fmt(task.dateEcheance)),
